#-----------------------------------------------#
# This plugin uses MiniMessages from Adventure  #
#           to display messages!                #
#                                               #
# Generator: https://webui.adventure.kyori.net  #
#-----------------------------------------------#
# Some messages contains placeholder for inputs #
#           you can use - <input-i>             #
#-----------------------------------------------#

version: 2.0.0
author: Miraculixx & JouTak


zone:
  # Input 1 -> Zone Name | Input 2 -> Banner Amount
  created: "<gray>Zone <white><input-1></white> created! It shows as a point on the Web-Map. Place more banners with the same name (while sneaking) to outline an area"
  rectangle: "<gray>Zone <white><input-1></white> now shows as a rectangle on the Web-Map"
  polygon: "<gray>Zone <white><input-1></white> now shows as a polygon on the Web-Map"
  banner-added: "<gray>Banner added to zone <white><input-1></white> <dark_gray>(<gray><input-2> banners</gray>)"
  banner-removed: "<gray>Banner removed from zone <white><input-1></white> <dark_gray>(<gray><input-2> banners left</gray>)"
  deleted: "<gray>Zone <white><input-1></white> was removed from the Web-Map"
  # Input 1 -> Zone Name | Input 2 -> Banner Amount
  banner-lost: "<yellow>Someone broke a banner of your zone <white><input-1></white>! <dark_gray>(<gray><input-2> banners left</gray>)"
  lost: "<red>Your zone <white><input-1></white> was completely removed - its last banner is gone!"
  # Input 1 -> Zone Name | Input 2 -> Days Left
  protected: "<red>This banner belongs to the zone <white><input-1></white> and is protected for <input-2> more day(s)"
  # Input 1 -> Max Amount
  limit: "<red>You reached your max amount of polygon zones! <dark_gray>(<gray><input-1></gray>)<red> Break banners of an old zone or keep extending an existing one"
  # Input 1 -> Max Amount
  point-limit: "<red>You reached your max amount of point markers! <dark_gray>(<gray><input-1></gray>)"
  # Input 1 -> Zone Name
  state-no-permission: "<red>The name <white><input-1></white> is reserved for state territories!"
  # Input 1 -> Max Length
  name-too-long: "<red>Zone names cannot be longer than <input-1> characters!"
  # Input 1 -> World Name
  blocked-world: "<red>This world is disabled. No zones will be created on the Web-Map"
  detail:
    type-player: "Player territory"
    type-state: "State territory"
    # Input 1 -> Owner Name
    owner: "Owner: <input-1>"
    # Input 1 -> Date
    founded: "Founded: <input-1>"
    # Input 1 -> Banner Amount | Input 2 -> Area
    size: "Banners: <input-1> · Area: ~<input-2> blocks"
    # Input 1 -> Protection Status
    protection: "Protection: <input-1>"
    # Input 1 -> Days Left
    protection-days: "<input-1> day(s) left"
    protection-expired: "expired"
    protection-permanent: "permanent"

event:
  # Input 1 -> Teleport Location
  teleport: "<green>You will be teleported as soon as the server load all chunks... <dark_gray>[<gray><click:run_command:'/tp <input-1>'><hover:show_text:'<gray>Teleport directly<br><red>This can impact server tick rate'>Teleport Now</hover></click></gray>]"

command:
  no-player: "<red>This command only works for players!"
  # Input 1 -> Player Name
  no-zones: "<red>The player <underlined><input-1></underlined> has no zones!"
