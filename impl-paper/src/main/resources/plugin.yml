main: de.miraculixx.bmbm.Main
version: "2.0.0"
name: BlueMap-Booking
description: "A BlueMap addition plugin. Let your players book territory zones on the map by placing named banners!"
author: Miraculixx & JouTak
website: https://github.com/JouTak/bluemap-booking
load: STARTUP
api-version: "26.1"
depend:
  - "BlueMap"
libraries:
  - "org.jetbrains.kotlin:kotlin-stdlib:2.3.0"
  - "org.jetbrains.kotlinx:kotlinx-coroutines-core:1.6.4"
  - "org.jetbrains.kotlinx:kotlinx-coroutines-jdk8:1.6.4"
  - "org.jetbrains.kotlinx:kotlinx-serialization-json:1.4.1"
  - "dev.jorel:commandapi-paper-shade:11.2.0"
  - "dev.jorel:commandapi-kotlin-paper:11.2.0"
  - "dev.jorel:commandapi-kotlin-core:11.2.0"
  - "de.miraculixx:kpaper:1.2.1"
