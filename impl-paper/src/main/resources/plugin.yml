main: de.miraculixx.bmbm.Main
version: 200
name: BlueMap-BannerMarker
description: "A BlueMap addition plugin. Let your players outline territory zones on the map by placing named banners!"
author: Miraculixx & JouTak
website: https://github.com/JouTak/bluemap-banner
load: STARTUP
api-version: 1.13
depend:
  - "BlueMap"
libraries:
  - "org.jetbrains.kotlin:kotlin-stdlib:2.1.0"
  - "org.jetbrains.kotlinx:kotlinx-coroutines-core:1.6.4"
  - "org.jetbrains.kotlinx:kotlinx-coroutines-jdk8:1.6.4"
  - "org.jetbrains.kotlinx:kotlinx-serialization-json:1.4.1"
  - "dev.jorel:commandapi-paper-shade:11.0.0"
  - "dev.jorel:commandapi-kotlin-paper:11.0.0"
  - "dev.jorel:commandapi-kotlin-core:11.0.0"
  - "de.miraculixx:kpaper:1.2.1"
