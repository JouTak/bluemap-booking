#---------------------------------------------#
#               General Settings              #
#---------------------------------------------#

# Change it to any name of a file located in the language folder (en_US, de_DE, ru_RU & fr_FR provided)
language: "en_US"

# If players should be notified about zone updates they trigger.
# Change those messages in the language files.
# Value: true / false
notify-player: true

# You can disable some worlds to block players from creating zones.
# Add a new dash with the name of your world to block it.
disabled-worlds:
  - "name-of-blocked-world"

# Words/names that are disabled and will not create zones.
# Use this for swear protection or blacklisted words.
blocked-words:
  - "Omnious Banner"


#---------------------------------------------#
#               Booking Settings              #
#---------------------------------------------#

booking:
  # How many days after zone creation its banners stay protected from other players.
  # While protected, only the owner (and booking.admin) can break zone banners.
  # The check happens at break time - nothing is scheduled.
  # Set to -1 to never expire.
  # Value: integer (days)
  protect-days: 30

  # The maximum amount of zones a player can own.
  # The highest permission a player owns defines the limit.
  # Permission: booking.zone-limit.<rank> (default applies to everyone)
  # Set to -1 for no limit.
  zone-limit:
    default: 1
    operator: -1

  # Maximum length of a zone name (banner name).
  max-name-length: 32

  # Marker styles on the web map. Opacity: 0.0 - 1.0
  style:
    player:
      fill-opacity: 0.30
      line-opacity: 0.85
      line-width: 2
    state:
      fill-opacity: 0.12
      line-opacity: 0.90
      line-width: 3

  # Zone names starting with one of those prefixes (ignoring case) are state
  # territories: placing such a banner requires the permission
  # 'booking.state.place' and creates a shared state zone that never expires.
  state-prefixes:
    - "JT -"
    - "ИТМО -"

  # The Marker-Set all zones are stored in.
  marker-set:
    label: "Booking"
    visible: true
    toggleable: true
